    <h1>游戏介绍</h1>

    <p>玩家通过武装多种植物切换不同的功能，快速有效地把僵尸阻挡在入侵的道路上。</p>
    <p>不同的敌人，不同的玩法构成五种不同的游戏模式，加之黑夜、浓雾以及泳池之类的障碍增加了游戏挑战性。</p>
    
    <p>而PVZ β版是在植物大战僵尸的基础上稍做修改的一个版本。</p>
